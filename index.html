<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Divine Vibrations Healing offers Reiki and sound healing in Metairie, Louisiana." />
  <title>Divine Vibrations Healing | Amrutha Darsi</title>

  <style>
    :root {
      --purple-dark: #3d185f;
      --purple: #6f3a8d;
      --purple-light: #efe5f6;
      --gold: #c7a23a;
      --gold-light: #f8f0d9;
      --white: #ffffff;
      --text: #2f2635;
      --muted: #6f6574;
      --shadow: 0 14px 35px rgba(61, 24, 95, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(1120px, 92%);
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(111, 58, 141, 0.12);
      backdrop-filter: blur(10px);
    }

    .nav {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--purple-dark);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      font-weight: 600;
      color: var(--purple-dark);
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .hero {
      min-height: 82vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 90px 0;
      background:
        radial-gradient(circle at top left, rgba(199, 162, 58, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(111, 58, 141, 0.28), transparent 35%),
        linear-gradient(135deg, #fbf8fd 0%, #f3e8f8 45%, #fffaf0 100%);
    }

    .hero-content {
      max-width: 850px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      border: 1px solid rgba(199, 162, 58, 0.55);
      border-radius: 999px;
      color: var(--purple-dark);
      background: rgba(255, 255, 255, 0.72);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1, h2, h3 {
      font-family: Georgia, "Times New Roman", serif;
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 5.4rem);
      line-height: 1.05;
      color: var(--purple-dark);
      margin-bottom: 20px;
    }

    .hero p {
      max-width: 720px;
      margin: 0 auto;
      font-size: 1.2rem;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(61, 24, 95, 0.16);
    }

    .button-primary {
      background: var(--purple-dark);
      color: var(--white);
    }

    .button-secondary {
      border: 2px solid var(--gold);
      color: var(--purple-dark);
      background: var(--white);
    }

    section {
      padding: 88px 0;
    }

    .section-heading {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 46px;
    }

    .section-heading span {
      color: var(--gold);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
    }

    .section-heading h2 {
      margin: 10px 0 14px;
      color: var(--purple-dark);
      font-size: clamp(2rem, 4vw, 3.1rem);
    }

    .section-heading p {
      color: var(--muted);
    }

    .about {
      background: var(--white);
    }

    .about-card {
      max-width: 900px;
      margin: 0 auto;
      padding: 38px;
      border-radius: 24px;
      background: linear-gradient(135deg, #ffffff, #fbf7fd);
      border: 1px solid rgba(111, 58, 141, 0.12);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .about-card h3 {
      color: var(--purple-dark);
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .about-card p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .services {
      background: var(--purple-light);
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 360px));
      justify-content: center;
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 22px;
      min-height: 175px;
      box-shadow: var(--shadow);
      border-top: 4px solid var(--gold);
      transition: transform 0.2s ease;
    }

    .service-card:hover {
      transform: translateY(-5px);
    }

    .service-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .service-card h3 {
      color: var(--purple-dark);
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .service-card p {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .contact {
      background: linear-gradient(135deg, var(--purple-dark), #6d3d87);
      color: var(--white);
    }

    .contact .section-heading h2,
    .contact .section-heading p {
      color: var(--white);
    }

    .contact-card {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 36px;
      text-align: center;
    }

    .contact-list {
      display: grid;
      gap: 14px;
      margin: 24px 0 30px;
      font-size: 1.08rem;
    }

    .contact-list a {
      color: var(--white);
      font-weight: 700;
    }

    .contact-list a:hover {
      color: var(--gold-light);
    }

    footer {
      padding: 28px 0;
      background: #25102f;
      color: rgba(255, 255, 255, 0.78);
      text-align: center;
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {
      .service-grid {
        grid-template-columns: repeat(2, minmax(240px, 1fr));
      }
    }

    @media (max-width: 700px) {
      .nav {
        flex-direction: column;
        padding: 16px 0;
      }

      .nav-links {
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
        font-size: 0.92rem;
      }

      .hero {
        min-height: auto;
        padding: 80px 0;
      }

      section {
        padding: 68px 0;
      }
    }

    @media (max-width: 560px) {
      .service-grid {
        grid-template-columns: 1fr;
      }

      .about-card,
      .contact-card {
        padding: 26px 20px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="container nav">
      <a class="brand" href="#home">Divine Vibrations Healing</a>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="container hero-content">
        <div class="eyebrow">A welcoming space for Reiki and Sound Healing</div>
        <h1>Divine Vibrations Healing</h1>
        <p>
          A welcoming space for Reiki and Sound Healing.
        </p>

        <div class="hero-actions">
          <a class="button button-primary" href="mailto:amrutadarsi@gmail.com?subject=Healing%20Session%20Inquiry">Book a Session</a>
</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      © 2026 Divine Vibrations Healing. All rights reserved.
    </div>
  </footer>
</body>
</html>
